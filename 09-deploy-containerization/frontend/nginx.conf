server {
    # nginx ascolta sulla porta interna del container frontend.
    listen 80;

    # Qui il Dockerfile copia la cartella dist prodotta da Vite.
    root /usr/share/nginx/html;
    index index.html;

    # Il browser richiede /api/health allo stesso origin del frontend.
    # Docker Compose mette frontend e backend nella stessa rete, quindi nginx
    # puo raggiungere il backend usando il nome del servizio: backend.
    # Lo slash finale di proxy_pass fa diventare /api/health -> /health.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React e una single-page application: per URL che non sono file statici
    # restituiamo index.html, poi React decide quale schermata mostrare.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
